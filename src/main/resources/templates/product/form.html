<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4" th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'"></h2>

    <form th:action="@{/products/save}" th:object="${product}" method="post" style="max-width:500px">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label for="name" class="form-label">Nama Produk</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Kategori</label>
            <select th:field="*{category}" class="form-select" required>
                <option value="">-- Pilih Kategori --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}" th:text="${cat}">Kategori</option>
            </select>
        </div>

        <!-- Simpan -->
        <div class="mt-4">
            <button type="submit" class="btn btn-primary" th:text="${product.id != null} ? 'Update' : 'Simpan'">Simpan</button>
            <a th:href="@{/products}" class="btn btn-secondary">Batal</a>
        </div>
    </form>
</div>

</body>
</html>
